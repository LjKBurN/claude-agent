services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-dev-api-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - MODEL_ID=${MODEL_ID:-claude-sonnet-4-6-20250514}
      - DATABASE_URL=sqlite+aiosqlite:///./data/claude_agent.db
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
